name: Sync Lançamentos DF → Banco

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT
  workflow_dispatch:

concurrency:
  group: lancamentos-sync
  cancel-in-progress: false

jobs:
  paulo-octavio:
    name: Paulo Octávio
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/paulo_octavio_sync.py

  elar:
    name: Elar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # site instável; não travar os demais
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/elar_sync.py

  riva:
    name: Riva Incorporadora
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/riva_sync.py

  direcional:
    name: Direcional
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/direcional_sync.py

  greenhouse:
    name: GreenHouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/greenhouse_sync.py

  lotus-cidade:
    name: Lotus Cidade
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/lotus_sync.py
      - name: Notificar conclusão
        if: always()
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS="success" || STATUS="failure"
          curl -sf -X POST "$SITE_URL/api/cron/notify"             -H "x-api-key: $SCRAPER_API_KEY"             -H "Content-Type: application/json"             -d "{\"workflow\":\"Lançamentos DF\",\"status\":\"$STATUS\"}" || true
