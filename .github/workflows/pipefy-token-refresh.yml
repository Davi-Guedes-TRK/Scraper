name: Renovar Token Pipefy

on:
  schedule:
    - cron: '0 9 */2 * *'   # a cada 2 dias às 06:00 BRT (token dura 3 dias)
  workflow_dispatch:          # permite rodar manualmente pela aba Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install playwright

      - name: Instalar Chromium
        run: playwright install chromium --with-deps

      - name: Renovar token (headless)
        id: refresh
        env:
          PIPEFY_SESSION_B64: ${{ secrets.PIPEFY_SESSION_B64 }}
        run: python scripts/pipefy_token_refresh.py

      - name: Atualizar PIPEFY_SESSION_B64 no GitHub (sessão renovada)
        continue-on-error: true   # GH_PAT opcional; sem ele o token ainda é atualizado no Vercel
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_SESSION_B64: ${{ steps.refresh.outputs.session_b64 }}
        run: |
          echo "$NEW_SESSION_B64" | gh secret set PIPEFY_SESSION_B64 --repo ${{ github.repository }}

      - name: Atualizar PIPEFY_TOKEN no Vercel (API REST)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID:   prj_kx2bwqph4Z7mxw0eiJ2vyLMFQvkb
          NEW_TOKEN:    ${{ steps.refresh.outputs.token }}
        run: |
          # Busca o ID atual do env var PIPEFY_TOKEN (evita ID stale no secret)
          TEAM_ID="team_EAj829uIn8xLDr4qC6yAnX4C"
          ENV_ID=$(curl -s \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          envs = data.get('envs', [])
          match = next((e['id'] for e in envs if e.get('key') == 'PIPEFY_TOKEN'), None)
          if not match:
              print('ERRO: PIPEFY_TOKEN nao encontrado nos envs do projeto', file=sys.stderr)
              sys.exit(1)
          print(match)
          ")
          echo "[*] ENV_ID encontrado: $ENV_ID"

          # Atualiza o valor
          RESP=$(curl -s -X PATCH \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$ENV_ID?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$NEW_TOKEN\"}")
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'error' in d:
              print('ERRO Vercel:', d['error'].get('message', d['error']))
              sys.exit(1)
          print('[OK] PIPEFY_TOKEN atualizado no Vercel:', d.get('key', '?'))
          "

      # Nota: process.env em serverless functions do Vercel é lido por invocação —
      # o novo token entra em vigor na próxima requisição sem precisar de redeploy.
