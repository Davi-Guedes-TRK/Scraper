name: Renovar Token Pipefy

on:
  schedule:
    - cron: '0 9 */2 * *'   # a cada 2 dias às 06:00 BRT (token dura 3 dias)
  workflow_dispatch:          # permite rodar manualmente pela aba Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install playwright

      - name: Instalar Chromium
        run: playwright install chromium --with-deps

      - name: Renovar token (headless)
        id: refresh
        env:
          PIPEFY_SESSION_B64: ${{ secrets.PIPEFY_SESSION_B64 }}
        run: python scripts/pipefy_token_refresh.py

      - name: Atualizar PIPEFY_TOKEN no Vercel (API REST)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ENV_ID:       ${{ secrets.PIPEFY_TOKEN_ENV_ID }}
          PROJECT_ID:   prj_kx2bwqph4Z7mxw0eiJ2vyLMFQvkb
          NEW_TOKEN:    ${{ steps.refresh.outputs.token }}
        run: |
          curl -sf -X PATCH \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$ENV_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$NEW_TOKEN\"}" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print('[OK] env atualizado:', d.get('key','?'))"

      - name: Re-deploy para aplicar novo token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID:   prj_kx2bwqph4Z7mxw0eiJ2vyLMFQvkb
        run: |
          # Pega o ID do último deploy de produção
          DEPLOY_ID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&target=production&limit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['deployments'][0]['uid'])")
          echo "Redeployando $DEPLOY_ID..."
          curl -sf -X POST \
            "https://api.vercel.com/v12/deployments/$DEPLOY_ID/redeploy" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"target":"production"}' \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print('[OK] redeploy:', d.get('url','?'))"
