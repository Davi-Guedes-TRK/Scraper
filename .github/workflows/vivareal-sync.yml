name: Sync Viva Real → Banco

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BRT
  workflow_dispatch:

concurrency:
  group: vivareal-sync
  cancel-in-progress: false

jobs:
  vivareal-sync:
    name: Viva Real — locação DF
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-playwright.txt
      - run: pip install -r scripts/requirements-playwright.txt
      - run: playwright install chromium --with-deps
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/vivareal_sync.py
