name: Sync Viva Real → Banco

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BRT
  workflow_dispatch:

concurrency:
  group: vivareal-sync
  cancel-in-progress: false

jobs:
  vivareal-sync:
    name: Viva Real — locação DF
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-playwright.txt
      - run: pip install -r scripts/requirements-playwright.txt
      - run: playwright install chromium --with-deps
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/vivareal_sync.py
      - name: Notificar conclusão
        if: always()
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS="success" || STATUS="failure"
          curl -sf -X POST "$SITE_URL/api/cron/notify"             -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN"
            -H "x-api-key: $SCRAPER_API_KEY"             -H "Content-Type: application/json"             -d "{\"workflow\":\"Viva Real\",\"status\":\"$STATUS\"}" || true
