name: Sync DFImóveis → Banco

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT
  workflow_dispatch:

concurrency:
  group: dfimoveis-sync
  cancel-in-progress: false

jobs:
  dfimoveis-sync:
    name: DFImóveis — aluguel cidades TRK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/dfimoveis_sync.py --tipo aluguel --tipo-imovel todos --paginas 20 --publicados-ha 1
