name: Sync DFImóveis → Banco

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT
  workflow_dispatch:

jobs:
  dfimoveis-sync:
    name: DFImóveis — aluguel cidades TRK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install curl_cffi beautifulsoup4 psycopg2-binary

      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/dfimoveis_sync.py --tipo aluguel --tipo-imovel todos --paginas 20 --publicados-ha 1
