name: Sync OLX → Banco

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT
  workflow_dispatch:

jobs:
  olx-sync:
    name: OLX — aluguel DF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install curl_cffi beautifulsoup4 psycopg2-binary

      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/olx_sync.py --tipo aluguel --paginas 20 --publicados-ha 1
