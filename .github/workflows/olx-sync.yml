name: Sync OLX → Banco

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT
  workflow_dispatch:

concurrency:
  group: olx-sync
  cancel-in-progress: false

jobs:
  olx-sync:
    name: OLX — aluguel DF
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/olx_sync.py --tipo aluguel --paginas 20 --publicados-ha 1
