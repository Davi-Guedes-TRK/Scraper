name: Sync Pipefy → Banco

on:
  schedule:
    - cron: '0 6 * * *'    # 03:00 BRT
    - cron: '0 14 * * *'   # 11:00 BRT
    - cron: '0 20 * * *'   # 17:00 BRT
  workflow_dispatch:

concurrency:
  group: pipefy-sync
  cancel-in-progress: false

jobs:
  pipefy-sync:
    name: Sincronizar cards do Pipefy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          PIPEFY_TOKEN: ${{ secrets.PIPEFY_TOKEN }}
          PIPEFY_PIPE_ID: '307179010'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/pipefy_sync.py
