name: Sync Pipefy → Banco

on:
  schedule:
    - cron: '0 6 * * *'    # 03:00 BRT
    - cron: '0 14 * * *'   # 11:00 BRT
    - cron: '0 20 * * *'   # 17:00 BRT
  workflow_dispatch:

concurrency:
  group: pipefy-sync
  cancel-in-progress: false

jobs:
  pipefy-sync:
    name: Sincronizar cards do Pipefy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          PIPEFY_TOKEN: ${{ secrets.PIPEFY_TOKEN }}
          PIPEFY_PIPE_ID: '307179010'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/pipefy_sync.py
      - name: Notificar conclusão
        if: always()
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS="success" || STATUS="failure"
          curl -sf -X POST "$SITE_URL/api/cron/notify" -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN" -H "x-api-key: $SCRAPER_API_KEY"             -H "Content-Type: application/json"             -d "{\"workflow\":\"Pipefy\",\"status\":\"$STATUS\"}" || true
