name: Sync Lotus Cidade → Banco

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT
  workflow_dispatch:

concurrency:
  group: lotus-sync
  cancel-in-progress: false

jobs:
  lotus-sync:
    name: Scrape lotuscidade.com.br
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/lotus_sync.py
