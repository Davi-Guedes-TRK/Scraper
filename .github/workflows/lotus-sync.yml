name: Sync Lotus Cidade → Banco

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT — 1x/dia
  workflow_dispatch:

jobs:
  lotus-sync:
    name: Scrape lotuscidade.com.br
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 psycopg2-binary

      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/lotus_sync.py
