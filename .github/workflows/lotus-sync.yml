name: Sync Lotus Cidade → Banco

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT
  workflow_dispatch:

concurrency:
  group: lotus-sync
  cancel-in-progress: false

jobs:
  lotus-sync:
    name: Scrape lotuscidade.com.br
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Sincronizar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/lotus_sync.py
      - name: Notificar conclusão
        if: always()
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS="success" || STATUS="failure"
          curl -sf -X POST "$SITE_URL/api/cron/notify" -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN" -H "x-api-key: $SCRAPER_API_KEY"             -H "Content-Type: application/json"             -d "{\"workflow\":\"Lotus Cidade\",\"status\":\"$STATUS\"}" || true
